services:
  web:
    image: odoo-dev:${ODOO_VERSION}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ODOO_PORT:-8069}:8069"
      - "${ODOO_DEBUG_PORT:-5678}:5678"
    volumes:
      - .:/workspace
      - ${HOME}/Odoo/.data/${ODOO_DB_NAME}:/var/lib/odoo
      - ./config:/etc/odoo
      # Custom modules
      - ${CUSTOMER_REPO}:/mnt/extra-addons
      # Upgrade utilities — expected structure: Upgrade/upgrade-util/ and Upgrade/upgrade/
      - ${ODOO_UPGRADE_PATH:-${HOME}/Odoo/Upgrade}:/mnt/upgrade:ro
      # Vault mounted at the same host path so git worktree symlinks resolve inside the container (required for GitLens)
      - ${ODOO_VAULT_PATH:-${HOME}/Odoo/.vault}:${ODOO_VAULT_PATH:-${HOME}/Odoo/.vault}:ro
      # CLAUDE.md file
      - ${CLAUDE_PATH:-${HOME}/.odoo_claude/CLAUDE.md}:/root/CLAUDE.md:ro
    environment:
      - ODOO_DEBUG=${ODOO_DEBUG:-true}
      - ODOO_DB_NAME=${ODOO_DB_NAME}
      - ODOO_EXTRA_ARGS=${ODOO_EXTRA_ARGS:-}

  db:
    image: postgres:17
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
      - ${DUMPS_PATH:-${HOME}/Odoo/Dumps}:/dumps:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Optional service — start with: make pgadmin
  pgadmin:
    image: dpage/pgadmin4
    profiles:
      - pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - odoo-pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:80/misc/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  odoo-db-data:
  odoo-pgadmin-data:
