services:
  web:
    image: odoo-dev:${ODOO_TARGET_VERSION}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ODOO_PORT:-8069}:8069"
      - "${ODOO_DEBUG_PORT:-5678}:5678"
    volumes:
      - .:/workspace
      - odoo-web-data:/var/lib/odoo
      # Configuration file if necessary
      - ./config:/etc/odoo
      # Source code -> <local_path>:<path_inside_container>
      - ${ODOO_WORKTREE_PATH}/${ODOO_TARGET_VERSION}/odoo:/opt/odoo-src/odoo:ro
      - ${ODOO_WORKTREE_PATH}/${ODOO_TARGET_VERSION}/enterprise:/opt/odoo-src/enterprise:ro
      - ${ODOO_WORKTREE_PATH}/${ODOO_TARGET_VERSION}/design-themes:/opt/odoo-src/design-themes:ro
      # Reference source code -> <local_path>:<path_inside_container>
      - ${ODOO_WORKTREE_PATH}/${ODOO_SOURCE_VERSION}/odoo:/mnt/reference/odoo:ro
      - ${ODOO_WORKTREE_PATH}/${ODOO_SOURCE_VERSION}/enterprise:/mnt/reference/enterprise:ro
      - ${ODOO_WORKTREE_PATH}/${ODOO_SOURCE_VERSION}/design-themes:/mnt/reference/design-themes:ro
      # Custom modules -> <local_path>:<path_inside_container>
      - ${CUSTOMER_REPO}:/mnt/extra-addons
      # Upgrade path -> <local_path>:<path_inside_container>
      - ${ODOO_UPGRADE_PATH}:/mnt/upgrade:ro
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
      - ODOO_DEBUG=${ODOO_DEBUG:-true}
      - ODOO_DB_NAME=${ODOO_DB_NAME}
      - ODOO_EXTRA_ARGS=${ODOO_EXTRA_ARGS:-}
    command:
      - sh
      - -c
      - |
        if [ "$$ODOO_DEBUG" = "true" ]; then
          exec python3 -m debugpy --listen 0.0.0.0:5678 \
            /opt/odoo-src/odoo/odoo-bin \
            --config /etc/odoo/odoo.conf \
            -d $$ODOO_DB_NAME \
            $$ODOO_EXTRA_ARGS
        else
          exec python3 /opt/odoo-src/odoo/odoo-bin \
            --config /etc/odoo/odoo.conf \
            -d $$ODOO_DB_NAME \
            $$ODOO_EXTRA_ARGS
        fi

  db:
    image: postgres:17
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
      - ${DUMPS_PATH}:/dumps:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 3s
      retries: 5

  # pgAdmin4 — useful for:
  #   - Deeper understanding of database structure
  #   - Inspect real schema between versions
  #   - Debug SQL queries with graphic tools
  #   - Analyze performance issues and deadlocks
  # Usage: docker compose --profile pgadmin up -d
  pgadmin:
    image: dpage/pgadmin4
    profiles:
      - pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  odoo-web-data:
  odoo-db-data:
