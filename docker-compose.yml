services:
  web:
    image: odoo-dev:${ODOO_TARGET_VERSION}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ODOO_PORT:-8069}:8069"
      - "${ODOO_DEBUG_PORT:-5678}:5678"
    volumes:
      - .:/workspace
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      # Odoo target version (read-only)
      - ${ODOO_WORKTREE_PATH}/${ODOO_TARGET_VERSION}/odoo:/opt/odoo-src/odoo:ro
      - ${ODOO_WORKTREE_PATH}/${ODOO_TARGET_VERSION}/enterprise:/opt/odoo-src/enterprise:ro
      - ${ODOO_WORKTREE_PATH}/${ODOO_TARGET_VERSION}/design-themes:/opt/odoo-src/design-themes:ro
      # Odoo source version for reference (read-only)
      - ${ODOO_WORKTREE_PATH}/${ODOO_SOURCE_VERSION}/odoo:/mnt/reference/odoo:ro
      - ${ODOO_WORKTREE_PATH}/${ODOO_SOURCE_VERSION}/enterprise:/mnt/reference/enterprise:ro
      - ${ODOO_WORKTREE_PATH}/${ODOO_SOURCE_VERSION}/design-themes:/mnt/reference/design-themes:ro
      # Custom modules
      - ${CUSTOMER_REPO}:/mnt/extra-addons
      # Upgrade utilities (used for migration scripts)
      - ${ODOO_UPGRADE_PATH}:/mnt/upgrade:ro
      # Vault mounted at the same host path so git worktree symlinks resolve inside the container (required for GitLens)
      - ${ODOO_VAULT_PATH}:${ODOO_VAULT_PATH}:ro
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
      - ODOO_DEBUG=${ODOO_DEBUG:-true}
      - ODOO_DB_NAME=${ODOO_DB_NAME}
      - ODOO_EXTRA_ARGS=${ODOO_EXTRA_ARGS:-}
    command:
      - sh
      - -c
      - |
        if [ "$$ODOO_DEBUG" = "true" ]; then
          exec python3 -m debugpy --listen 0.0.0.0:5678 \
            /opt/odoo-src/odoo/odoo-bin \
            --config /etc/odoo/odoo.conf \
            -d $$ODOO_DB_NAME \
            $$ODOO_EXTRA_ARGS
        else
          exec python3 /opt/odoo-src/odoo/odoo-bin \
            --config /etc/odoo/odoo.conf \
            -d $$ODOO_DB_NAME \
            $$ODOO_EXTRA_ARGS
        fi

  db:
    image: postgres:17
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
      - ${DUMPS_PATH}:/dumps:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Optional service — enable with: docker compose --profile pgadmin up -d
  pgadmin:
    image: dpage/pgadmin4
    profiles:
      - pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - odoo-pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:80/misc/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  odoo-web-data:
  odoo-db-data:
  odoo-pgadmin-data:
